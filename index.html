<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridMaster Pro | مولد الشبكات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: #09090b;
            color: #fafafa;
        }
        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .preview-area {
            background-image: radial-gradient(#27272a 1px, transparent 1px);
            background-size: 20px 20px;
        }
        input[type="range"] {
            accent-color: #6366f1;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #18181b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div class="min-h-screen flex flex-col">
        <header class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950/50 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Grid<span class="gradient-text">Master</span> <span class="text-xs font-light text-zinc-500 border border-zinc-700 px-2 py-0.5 rounded-full mr-2">PRO</span></h1>
            </div>
            <button id="downloadBtn" class="bg-zinc-100 text-zinc-950 px-5 py-2.5 rounded-xl font-semibold hover:bg-white transition-all flex items-center gap-2 shadow-xl active:scale-95">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                تحميل SVG
            </button>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:col-span-12 lg:grid-cols-12 gap-0 overflow-hidden">
            <aside class="lg:col-span-3 border-l border-zinc-800 p-6 overflow-y-auto custom-scrollbar glass-panel">
                <div class="space-y-8">
                    <section>
                        <h3 class="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="3"/></svg>
                            الأبعاد
                        </h3>
                        <div class="space-y-4">
                            <select id="preset" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer">
                                <option value="1080,1920">تيك توك / ريلز (9:16)</option>
                                <option value="1080,1080">منشور انستقرام (1:1)</option>
                                <option value="1080,1350">بورتريه انستقرام (4:5)</option>
                                <option value="1280,720">يوتيوب / فيديو (16:9)</option>
                                <option value="custom">أبعاد مخصصة...</option>
                            </select>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="width" value="1080" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5 text-center text-sm focus:border-blue-500 outline-none">
                                <input type="number" id="height" value="1920" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5 text-center text-sm focus:border-blue-500 outline-none">
                            </div>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                            الشبكة
                        </h3>
                        <div class="space-y-6">
                            <div>
                                <div class="flex justify-between mb-2 px-1 text-sm">
                                    <span class="text-zinc-300">حجم المربع</span>
                                    <span id="gridSizeVal" class="text-blue-400 font-mono">60px</span>
                                </div>
                                <input type="range" id="gridSize" min="20" max="300" value="60" class="w-full">
                            </div>
                            <div>
                                <div class="flex justify-between mb-2 px-1 text-sm">
                                    <span class="text-zinc-300">سماكة الخط</span>
                                    <span id="strokeWidthVal" class="text-blue-400 font-mono">1.5px</span>
                                </div>
                                <input type="range" id="strokeWidth" min="0.5" max="10" step="0.1" value="1.5" class="w-full">
                            </div>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                            الألوان
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="color" id="bgColor" value="#000000" class="w-full h-12 rounded-xl bg-zinc-900 border border-zinc-700 p-1 cursor-pointer">
                            <input type="color" id="lineColor" value="#333333" class="w-full h-12 rounded-xl bg-zinc-900 border border-zinc-700 p-1 cursor-pointer">
                        </div>
                    </section>
                </div>
            </aside>

            <section class="lg:col-span-9 flex flex-col p-8 bg-zinc-900/30 preview-area relative min-h-[500px]">
                <div class="flex-1 flex items-center justify-center relative">
                    <div id="svgContainer" class="max-w-full max-h-full shadow-2xl rounded-sm ring-1 ring-white/10 bg-black overflow-hidden">
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-end text-[10px] text-zinc-600 font-mono uppercase tracking-widest">
                    <span>نظام الخطوط المستقلة (Lines)</span>
                    <span id="canvasStats">1080 X 1920 PX</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        const config = {
            preset: document.getElementById('preset'),
            width: document.getElementById('width'),
            height: document.getElementById('height'),
            gridSize: document.getElementById('gridSize'),
            gridSizeVal: document.getElementById('gridSizeVal'),
            strokeWidth: document.getElementById('strokeWidth'),
            strokeWidthVal: document.getElementById('strokeWidthVal'),
            bgColor: document.getElementById('bgColor'),
            lineColor: document.getElementById('lineColor'),
            svgContainer: document.getElementById('svgContainer'),
            downloadBtn: document.getElementById('downloadBtn'),
            stats: document.getElementById('canvasStats')
        };

        function buildSVG(isDownload = false) {
            const w = parseInt(config.width.value) || 1080;
            const h = parseInt(config.height.value) || 1920;
            const step = parseInt(config.gridSize.value) || 60;
            const bg = config.bgColor.value;
            const line = config.lineColor.value;
            const stroke = config.strokeWidth.value;

            let markup = `<rect width="${w}" height="${h}" fill="${bg}" />\n`;
            markup += `<g stroke="${line}" stroke-width="${stroke}" stroke-linecap="round">\n`;

            for (let x = step; x < w; x += step) {
                markup += `  <line x1="${x}" y1="0" x2="${x}" y2="${h}" />\n`;
            }
            for (let y = step; y < h; y += step) {
                markup += `  <line x1="0" y1="${y}" x2="${w}" y2="${y}" />\n`;
            }
            markup += `</g>`;

            const sizeAttr = isDownload ? `width="${w}" height="${h}"` : '';
            return `<svg ${sizeAttr} viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="display:block;">\n${markup}\n</svg>`;
        }

        function refresh() {
            config.svgContainer.innerHTML = buildSVG(false);
            config.gridSizeVal.innerText = `${config.gridSize.value}px`;
            config.strokeWidthVal.innerText = `${config.strokeWidth.value}px`;
            config.stats.innerText = `${config.width.value} X ${config.height.value} PX`;

            const el = config.svgContainer.querySelector('svg');
            const ratio = config.width.value / config.height.value;
            
            if (window.innerWidth < 1024) {
                el.style.width = ratio > 1 ? '90vw' : 'auto';
                el.style.height = ratio > 1 ? 'auto' : '50vh';
            } else {
                el.style.height = ratio > 1 ? 'auto' : '70vh';
                el.style.width = ratio > 1 ? '50vw' : 'auto';
            }
        }

        config.preset.onchange = () => {
            if (config.preset.value !== "custom") {
                const [w, h] = config.preset.value.split(',');
                config.width.value = w;
                config.height.value = h;
                refresh();
            }
        };

        [config.width, config.height, config.gridSize, config.strokeWidth, config.bgColor, config.lineColor].forEach(el => {
            el.oninput = refresh;
        });

        config.downloadBtn.onclick = () => {
            const blob = new Blob([buildSVG(true)], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Grid_${config.width.value}x${config.height.value}.svg`;
            link.click();
            URL.revokeObjectURL(url);
        };

        window.onresize = refresh;
        window.onload = refresh;
    </script>
</body>
</html>
