<body class="antialiased pb-10">

        <header class="h-16 border-b border-zinc-800 flex justify-between items-center px-6 bg-zinc-950/80 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                </div>
                <h1 class="text-lg font-bold">Grid<span class="text-blue-500">Master</span></h1>

        <main class="max-w-xl mx-auto w-full p-5 space-y-6">

                <button onclick="switchTab('colors')" id="tab-colors" class="tab-trigger flex-1 py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 text-zinc-400">

                    </button>

                </div>

                        <input type="number" id="height" value="1920" class="w-full bg-transparent border-none p-0 text-sm text-center focus:outline-none font-mono text-blue-400">
                    </div>
                </div>

                <div class="control-card">
                    <div class="flex justify-between mb-2">
                        <span class="text-[11px] font-bold text-zinc-400 uppercase">عدد المربعات</span>
                        <span id="gridCountVal" class="text-blue-500 font-mono text-[11px]">4</span>
                    </div>
                    <input type="range" id="gridCount" min="2" max="50" value="4" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none">

                        <span id="strokeWidthVal" class="text-blue-500 font-mono text-[11px]">2px</span>
                    </div>

                        <span id="colorCountVal" class="text-blue-500 font-mono text-[11px]">10</span>
                    </div>
                    <input type="range" id="colorCount" min="2" max="20" value="10" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none">
                </div>
            </section>

            <section class="flex flex-col items-center pt-2">
                <div id="svgContainer" class="w-full flex items-center justify-center min-h-[300px]"></div>
                <div class="w-full mt-6 flex justify-between items-center text-[10px] font-mono text-zinc-500 bg-zinc-900/50 p-3 rounded-lg border border-zinc-800">
                    <span id="statsLabel">...</span>
                    <span id="resStats">1080 × 1920 PX</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentTab = 'grid';
        let colorsArr = [];

        const ui = {
            width: document.getElementById('width'),
            height: document.getElementById('height'),
            gridCount: document.getElementById('gridCount'),
            gridCountVal: document.getElementById('gridCountVal'),
            strokeWidth: document.getElementById('strokeWidth'),
            strokeWidthVal: document.getElementById('strokeWidthVal'),
            colorCount: document.getElementById('colorCount'),
            colorCountVal: document.getElementById('colorCountVal'),
            svgContainer: document.getElementById('svgContainer'),
            resStats: document.getElementById('resStats'),
            statsLabel: document.getElementById('statsLabel'),
            gridSec: document.getElementById('gridSettings'),
            colorSec: document.getElementById('colorSettings')
        };

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-trigger').forEach(el => {
                el.classList.remove('active', 'text-white');
                el.classList.add('text-zinc-400');
            });
            const activeTab = document.getElementById('tab-' + tab);
            activeTab.classList.add('active', 'text-white');
            activeTab.classList.remove('text-zinc-400');
            
            if(tab === 'grid') {
                ui.gridSec.classList.remove('hidden');
                ui.colorSec.classList.add('hidden');
            } else {
                ui.gridSec.classList.add('hidden');
                ui.colorSec.classList.remove('hidden');
                if(colorsArr.length === 0) generateRandomColors();
            }
            update();
        }

        function generateRandomColors() {
            const count = parseInt(ui.colorCount.value);
            colorsArr = Array.from({length: count}, () => {
                const h = Math.floor(Math.random() * 360);
                return hslToHex(h, 80, 50);
            });
        }

        function generateSVG(isDownload = false) {
            const w = parseInt(ui.width.value) || 1080;
            const h = parseInt(ui.height.value) || 1920;
            let content = "";

            if (currentTab === 'grid') {
                content += `<rect width="${w}" height="${h}" fill="#000000" />`;
                const cols = parseInt(ui.gridCount.value);
                const cw = w / cols;
                const rows = Math.round(h / cw);
                const ch = h / rows;
                const stroke = ui.strokeWidth.value;

                content += `<g stroke="#333333" stroke-width="${stroke}">`;
                for (let i = 0; i <= cols; i++) content += `<line x1="${i*cw}" y1="0" x2="${i*cw}" y2="${h}" />`;
                for (let i = 0; i <= rows; i++) content += `<line x1="0" y1="${i*ch}" x2="${w}" y2="${i*ch}" />`;
                content += `</g>`;
                
                ui.statsLabel.innerText = `الشبكة: ${cols}×${rows}`;
            } else {
                const count = parseInt(ui.colorCount.value);
                const id = 'grad_' + Math.random().toString(36).substr(2,5);
                content += `<defs><linearGradient id="${id}" x1="0" y1="0" x2="${w}" y2="${h}" gradientUnits="userSpaceOnUse">`;
                colorsArr.forEach((c, i) => content += `<stop offset="${(i/(count-1))*100}%" stop-color="${c}" />`);
                content += `</linearGradient></defs><rect width="${w}" height="${h}" fill="url(#${id})" />`;
                ui.statsLabel.innerText = `الألوان: ${count}`;
            }
            
            return `<svg xmlns="http://www.w3.org/2000/svg" width="${isDownload ? w : '100%'}" height="${isDownload ? h : 'auto'}" viewBox="0 0 ${w} ${h}">${content}</svg>`;
        }

        function update() {
            ui.gridCountVal.innerText = ui.gridCount.value;
            ui.strokeWidthVal.innerText = ui.strokeWidth.value + 'px';
            ui.colorCountVal.innerText = ui.colorCount.value;
            ui.resStats.innerText = `${ui.width.value} × ${ui.height.value} PX`;
            ui.svgContainer.innerHTML = generateSVG(false);
        }

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                ui.width.value = btn.dataset.w; ui.height.value = btn.dataset.h;
                update();
            };
        });

        ui.colorCount.oninput = () => { generateRandomColors(); update(); };
        [ui.width, ui.height, ui.gridCount, ui.strokeWidth].forEach(el => el.oninput = update);

        document.getElementById('downloadBtn').onclick = () => {
            const svg = generateSVG(true);
            const blob = new Blob([svg], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `GridMaster_Design_${Date.now()}.svg`; a.click();
        };

        window.onload = update;
    </script>
</body>
</html>
