<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: #050505;
            color: #fafafa;
            margin: 0;
            overflow-y: auto;
        }
        input[type="range"] {
            accent-color: #3b82f6;
        }
        #svgContainer svg {
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #000;
            border-radius: 4px;
        }
        .preset-btn {
            transition: all 0.2s ease;
            border: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            gap: 6px;
            padding: 10px 2px;
        }
        .preset-btn.active {
            background: #1e1e1e;
            border-color: #3b82f6;
            transform: scale(1.02);
        }
        .shape-preview {
            border: 1.5px solid #555;
            background: transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .active .shape-preview {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
        }
        .control-card {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 12px;
        }
    </style>
</head>
<body class="antialiased pb-10">
    <div class="flex flex-col min-h-screen">
        <header class="h-16 border-b border-zinc-800 flex justify-between items-center px-6 bg-zinc-950/80 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                </div>
                <h1 class="text-lg font-bold">Grid<span class="text-blue-500">Master</span></h1>
            </div>
            <button id="downloadBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-900/20 text-sm">
                تحميل SVG
            </button>
        </header>

        <main class="max-w-xl mx-auto w-full p-5 space-y-6">
            <section class="space-y-4">
                <div class="flex flex-row gap-2">
                    <button class="preset-btn active flex-1 rounded-lg" data-w="1080" data-h="1920">
                        <div class="shape-preview" style="width: 12px; height: 20px; border-radius: 2px;"></div>
                        <span class="text-[9px] text-zinc-500 font-mono">9:16</span>
                    </button>
                    <button class="preset-btn flex-1 rounded-lg" data-w="1080" data-h="1350">
                        <div class="shape-preview" style="width: 16px; height: 20px; border-radius: 2px;"></div>
                        <span class="text-[9px] text-zinc-500 font-mono">4:5</span>
                    </button>
                    <button class="preset-btn flex-1 rounded-lg" data-w="1080" data-h="1080">
                        <div class="shape-preview" style="width: 18px; height: 18px; border-radius: 2px;"></div>
                        <span class="text-[9px] text-zinc-500 font-mono">1:1</span>
                    </button>
                    <button class="preset-btn flex-1 rounded-lg" data-w="1920" data-h="1080">
                        <div class="shape-preview" style="width: 24px; height: 14px; border-radius: 2px;"></div>
                        <span class="text-[9px] text-zinc-500 font-mono">16:9</span>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="control-card">
                        <span class="text-[10px] text-zinc-500 block mb-1 font-bold text-center">العرض الثابت</span>
                        <input type="number" id="width" value="1080" class="w-full bg-transparent border-none p-0 text-sm text-center focus:outline-none font-mono">
                    </div>
                    <div class="control-card">
                        <span class="text-[10px] text-zinc-500 block mb-1 font-bold text-center">الطول الثابت</span>
                        <input type="number" id="height" value="1920" class="w-full bg-transparent border-none p-0 text-sm text-center focus:outline-none font-mono">
                    </div>
                </div>

                <div class="control-card">
                    <div class="flex justify-between mb-2">
                        <span class="text-[11px] font-bold text-zinc-400 uppercase">عدد مربعات العرض</span>
                        <span id="gridSizeVal" class="text-blue-500 font-mono text-[11px]">4</span>
                    </div>
                    <input type="range" id="gridCount" min="1" max="100" value="4" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none">
                </div>

                <div class="control-card">
                    <div class="flex justify-between mb-2">
                        <span class="text-[11px] font-bold text-zinc-400 uppercase">سماكة الخط</span>
                        <span id="strokeWidthVal" class="text-blue-500 font-mono text-[11px]">2px</span>
                    </div>
                    <input type="range" id="strokeWidth" min="0.5" max="30" step="0.5" value="2" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none">
                </div>
            </section>

            <section class="flex flex-col items-center pt-4">
                <div id="svgContainer" class="w-full flex items-center justify-center min-h-[400px]"></div>
                
                <div class="w-full mt-6 flex justify-between items-center text-[10px] font-mono text-zinc-500 bg-zinc-900/50 p-3 rounded-lg border border-zinc-800">
                    <span id="gridStats">...</span>
                    <span id="resStats">1080 × 1920 PX</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        const config = {
            width: document.getElementById('width'),
            height: document.getElementById('height'),
            gridCount: document.getElementById('gridCount'),
            gridSizeVal: document.getElementById('gridSizeVal'),
            strokeWidth: document.getElementById('strokeWidth'),
            strokeWidthVal: document.getElementById('strokeWidthVal'),
            svgContainer: document.getElementById('svgContainer'),
            downloadBtn: document.getElementById('downloadBtn'),
            gridStats: document.getElementById('gridStats'),
            resStats: document.getElementById('resStats'),
            presetBtns: document.querySelectorAll('.preset-btn')
        };

        function calculateGridParams() {
            const w = parseInt(config.width.value) || 1080;
            const h = parseInt(config.height.value) || 1920;
            const cols = parseInt(config.gridCount.value);
            
            const cellSizeW = w / cols;
            const rows = Math.round(h / cellSizeW);
            const cellSizeH = h / rows;

            return { w, h, cellSizeW, cellSizeH, cols, rows };
        }

        function generateSVG(isDownload = false) {
            const p = calculateGridParams();
            const stroke = config.strokeWidth.value;
            const bg = "#000000";
            const line = "#333333";
            
            let lines = `<rect width="${p.w}" height="${p.h}" fill="${bg}" />\n<g stroke="${line}" stroke-width="${stroke}">\n`;
            
            for (let i = 0; i <= p.cols; i++) {
                const x = i * p.cellSizeW;
                lines += `<line x1="${x}" y1="0" x2="${x}" y2="${p.h}" />\n`;
            }
            
            for (let i = 0; i <= p.rows; i++) {
                const y = i * p.cellSizeH;
                lines += `<line x1="0" y1="${y}" x2="${p.w}" y2="${y}" />\n`;
            }
            
            lines += `</g>`;
            const attrs = isDownload ? `width="${p.w}" height="${p.h}"` : `style="max-width:100%; max-height:70vh; height:auto;"`;
            return `<svg ${attrs} viewBox="0 0 ${p.w} ${p.h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">${lines}</svg>`;
        }

        function update() {
            const p = calculateGridParams();
            config.gridSizeVal.innerText = p.cols;
            config.strokeWidthVal.innerText = config.strokeWidth.value + 'px';
            config.resStats.innerText = p.w + ' × ' + p.h + ' PX';
            config.gridStats.innerText = `الشبكة: ${p.cols}×${p.rows}`;
            config.svgContainer.innerHTML = generateSVG(false);
        }

        config.presetBtns.forEach(btn => {
            btn.onclick = () => {
                config.presetBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                config.width.value = btn.dataset.w;
                config.height.value = btn.dataset.h;
                update();
            };
        });

        [config.width, config.height, config.gridCount, config.strokeWidth].forEach(el => el.oninput = update);

        config.downloadBtn.onclick = () => {
            const svgData = generateSVG(true);
            const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `GridMaster_${config.width.value}x${config.height.value}.svg`;
            link.click();
        };
        window.onload = update;
    </script>
</body>
</html>
